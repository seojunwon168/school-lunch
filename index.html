<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>광운인공지능고 급식</title>
    <link rel="stylesheet" href="style.css?v=4">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app" id="app">
        <!-- 상단 네비게이션 -->
        <section class="section date-nav-section" id="weekend-banner-wrap">
            <div class="weekend-banner" id="weekend-banner" style="display:none;">
                📭 주말에는 학교가 닫아 급식 정보가 없습니다.
            </div>

            <div class="date-nav" style="position: relative;">
                <button class="nav-btn" id="prev-day">◀</button>
                <div class="date-center">
                    <span class="date-label" id="date-label"></span>
                    <button class="calendar-icon" id="open-calendar">📅</button>
                </div>
                <button class="nav-btn" id="next-day">▶</button>

                <!-- 드롭다운 달력 -->
                <div class="calendar-dropdown" id="calendar-dropdown" style="display:none;">
                    <div class="cal-drop-header">
                        <button class="cal-drop-nav" id="cal-prev-month">◀</button>
                        <span class="cal-drop-month" id="sheet-month-label"></span>
                        <button class="cal-drop-nav" id="cal-next-month">▶</button>
                    </div>
                    <div class="calendar-weekdays">
                        <span class="wd sun">일</span><span class="wd">월</span><span class="wd">화</span>
                        <span class="wd">수</span><span class="wd">목</span><span class="wd">금</span><span class="wd sat">토</span>
                    </div>
                    <div class="calendar-grid" id="bottom-calendar-grid"></div>
                    <button class="go-today-btn" id="go-today">오늘로 이동</button>
                </div>
            </div>

            <!-- 점심시간 표시 -->
            <div class="lunch-status-container">
                <div id="lunch-countdown" class="lunch-countdown"></div>
                <div class="lunch-status" id="lunch-status"></div>
            </div>
        </section>

        <!-- 탭 메뉴 -->
        <div class="tab-bar">
            <button class="tab-btn active" id="tab-meal" data-tab="meal">🍱 급식</button>
            <button class="tab-btn" id="tab-review" data-tab="review">⭐ 리뷰</button>
        </div>

        <!-- 급식 탭 -->
        <div id="page-meal" class="tab-page">
            <section class="section meal-section">
                <div class="card-header">
                    <h2 class="meal-title">오늘의 급식</h2>
                    <span class="cal-badge" id="cal-badge"></span>
                </div>
                <div class="meal-list" id="meal-list">
                    <div class="loader">불러오는 중...</div>
                </div>
            </section>
            <section class="section allergy-section">
                <div class="section-header">
                    <h2>알레르기 설정 ⚠️</h2>
                    <button class="toggle-btn" id="allergy-toggle">펼치기</button>
                </div>
                <p class="allergy-hint" id="allergy-hint" style="display:none;">해당하는 항목을 선택하면 급식 메뉴에 표시됩니다.</p>
                <div class="allergy-chips" id="allergy-chips" style="display:none;"></div>
            </section>
        </div>

        <!-- 리뷰 탭 -->
        <div id="page-review" class="tab-page" style="display:none;">
            <section class="section review-section">
                <h2 class="review-page-title">오늘 급식 어땠나요?</h2>
                <p class="review-date-sub" id="review-date-sub"></p>
                <div class="stars" id="stars">
                    <span class="star" data-value="1" id="star-1">★</span>
                    <span class="star" data-value="2" id="star-2">★</span>
                    <span class="star" data-value="3" id="star-3">★</span>
                    <span class="star" data-value="4" id="star-4">★</span>
                    <span class="star" data-value="5" id="star-5">★</span>
                </div>
                <div class="rating-msg" id="rating-msg">별점을 눌러 주세요</div>
                <div class="review-input-wrap">
                    <textarea id="review-text" class="review-textarea" placeholder="자유롭게 작성해 보세요..." maxlength="300" rows="4"></textarea>
                    <div class="review-char-count"><span id="char-count">0</span>/300</div>
                    <button class="save-btn" id="save-review">저장하기 💾</button>
                </div>
                <div class="saved-review" id="saved-review" style="display:none;">
                    <div class="saved-label">📝 저장된 리뷰</div>
                    <div class="saved-text" id="saved-text"></div>
                </div>
            </section>
        </div>
    </div>

    <!-- 달력 바깥 클릭 감지용 오버레이 -->
    <div class="dropdown-overlay" id="dropdown-overlay" style="display:none;"></div>

    <script src="app.js?v=4"></script>
</body>
</html>
